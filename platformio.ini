; PlatformIO project for the ESP32-2432S028R (Cheap Yellow Display) throttle.
; Vollständiger WLAN-Lokregler: TFT_eSPI-UI + XPT2046-Touch + WiFi/WebSocket
; gegen das rmx-sx-wlan-gateway (Protokoll siehe docs/ + protocol.py).
;
; Hardware: CYD ESP32-2432S028R
;   TFT:  ILI9341, SPI VSPI, TFT_MISO=12 TFT_MOSI=13 TFT_SCLK=14 TFT_CS=15 TFT_DC=2 TFT_RST=-1 TFT_BL=21
;   TOUCH: XPT2046, SPI VSPI (shared), TOUCH_CS=33
;
; Credentials / Host werden über build_flags gesetzt.
; HINWEIS: WLAN_SSID + WLAN_PASSWORD kommen aus gitignored platformio.local.ini
; (extra_configs unten). Diese Datei wird NICHT committet (.gitignore) und
; enthaelt das ECHTE Passwort (Quelle: ~/.hermes/.env WLANPASS, einheitlich
; mit dem Pi-AP). Bewusst KEINE -D WIFI_*-Flags hier, damit der echte Wert aus
; platformio.local.ini den Platzhalter in config.h ueberschreibt.

[platformio]
extra_configs = platformio.local.ini

[env:esp32dev]
; Pin auf Core-v2-Linie: espressif32 6.9.0 = Arduino-ESP32-Core 2.0.17.
; WICHTIG: TFT_eSPI 2.5.43 ist NICHT kompatibel mit Core v3.x (Platform 7.x)
; -> init() haengt -> weisser Schirm. Deshalb hier PINNEN (nicht "espressif32"
; ungepinnt, was heute 7.0.1/Core3 aufloest).
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    paulstoffregen/XPT2046_Touchscreen@0.0.0-alpha+sha.26b691b2c8
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.1.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    ; --- Gateway-Verbindung (anpassen!) ---
    -D GW_HOST=\"192.168.50.1\"
    -D GW_PORT=8080
    -D CLIENT_ID=\"fahrregler-01\"
    -D GW_INTERFACE=\"sim1\"
    -D GW_BUS=\"RMX0\"
    -D GW_ADDRESS=110
    ; --- Debug-Overlay (T:N Touch-Leiste + L Loop-Counter) ---
    ; Per Default AUS (sauberes Produktivbild, ueberschreibt sonst Display).
    ; Zum Debuggen einkommentieren:
    ; -D DEBUG_OVERLAY=1

    ; === WLAN-Passwort aus gitignored platformio.local.ini =================
    ; WICHTIG (Root-Cause des weissen Schirms in v0.2.16): PlatformIO haengt
    ; extra_configs NICHT an build_flags an, sondern ERSETZT sie. Eine erneute
    ; `build_flags =`-Zeile in local.ini wuerde ALLE obigen TFT_*-Defines
    ; tilgen -> TFT_eSPI auf Default-Pins -> weisser Schirm. Deshalb kommt das
    ; Passwort als roher Wert aus der EIGENEN Sektion [wlanpass] in local.ini
    ; und wird hier sicher zu einem -D-Flag interpoliert.
    -D WIFI_PASSWORD=\"${wlanpass.password}\"

